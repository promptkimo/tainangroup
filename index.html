<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台南社區藥局藥品供應平台</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }
    .header-container { text-align: center; margin-bottom: 30px; }
    .header-container img { width: 150px; height: auto; }
    .header-container h1 { color: #333; margin: 10px 0 5px 0; }
    .header-container p { color: #666; font-size: 14px; margin: 0; }
    .form-container {
      background: white; padding: 30px; border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px;
    }
    input {
      width: 100%; padding: 10px; margin: 10px 0;
      border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 10px; background-color: #4CAF50;
      color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
    }
    button:hover { background-color: #45a049; }
    .switch-mode { text-align: center; margin-top: 15px; font-size: 14px; color: #0066cc; cursor: pointer; }
    #register-form { display: none; }
    .loading { display: none; text-align: center; margin-top: 10px; color: #ff9800; font-weight: bold;}
  </style>
</head>
<body>

  <div class="header-container">
    <img src="https://i.imgur.com/placeholder.jpg" alt="Logo">
    <h1>台南社區藥局藥品供應平台</h1>
    <p>行政院衛生署補(捐)助科技發展計畫</p>
  </div>

  <div class="form-container">
    <div id="login-form">
      <h2 style="text-align: center;">登入</h2>
      <input type="text" id="login-username" placeholder="請輸入帳號">
      <input type="password" id="login-password" placeholder="請輸入密碼">
      <button onclick="doLogin()">登入系統</button>
      <div id="login-loading" class="loading">處理中，請稍候...</div>
      <div class="switch-mode" onclick="toggleForm()">還沒有帳號？點此註冊</div>
    </div>

    <div id="register-form">
      <h2 style="text-align: center;">申請帳號</h2>
      <input type="text" id="reg-pharmacy" placeholder="藥局名稱 (必填)">
      <input type="text" id="reg-contact" placeholder="聯絡資訊 (電話/Email)">
      <input type="text" id="reg-username" placeholder="設定帳號">
      <input type="password" id="reg-password" placeholder="設定密碼">
      <button onclick="doRegister()">送出申請</button>
      <div id="reg-loading" class="loading">處理中，請稍候...</div>
      <div class="switch-mode" onclick="toggleForm()">已有帳號？點此登入</div>
    </div>
  </div>

  <script>
    // ==========================================
    // 這裡已經換成您專屬的 GAS 網址囉！
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz2d0XPN4dHlscPC4Mapd-GlySIfW7LUKXR6vZXwgpTb7BJdyY4uvvkm4n042jHQeN5CQ/exec"; 

    // 切換表單顯示狀態
    function toggleForm() {
      const loginForm = document.getElementById('login-form');
      const regForm = document.getElementById('register-form');
      if (loginForm.style.display === 'none') {
        loginForm.style.display = 'block';
        regForm.style.display = 'none';
      } else {
        loginForm.style.display = 'none';
        regForm.style.display = 'block';
      }
    }

    // 呼叫 GAS 後端的共用函式 (負責連線與傳遞資料)
    async function callGasAPI(data, loadingElementId) {
      document.getElementById(loadingElementId).style.display = 'block'; // 顯示載入中
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          // 使用 text/plain 可以避免瀏覽器發送預檢請求 (CORS preflight)，減少連線問題
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
          body: JSON.stringify(data)
        });
        const result = await response.json();
        document.getElementById(loadingElementId).style.display = 'none'; // 隱藏載入中
        return result;
      } catch (error) {
        document.getElementById(loadingElementId).style.display = 'none';
        alert('連線失敗，請稍後再試。這可能是網路問題或 GAS 權限未開放。');
        console.error('Error:', error);
      }
    }

    // 處理登入動作
    async function doLogin() {
      const user = document.getElementById('login-username').value;
      const pass = document.getElementById('login-password').value;
      if(!user || !pass) { alert("請輸入帳號與密碼！"); return; }

      // 準備要傳送給 GAS 的資料打包
      const postData = { action: 'login', username: user, password: pass };
      const result = await callGasAPI(postData, 'login-loading');

      if (result) {
        alert(result.message);
        if (result.success) {
          // 下一階段我們會在這裡把畫面切換成您的「藥品列表」
          alert("未來這裡會跳轉到藥品訂購列表！");
        }
      }
    }

    // 處理註冊動作
    async function doRegister() {
      const name = document.getElementById('reg-pharmacy').value;
      const contact = document.getElementById('reg-contact').value;
      const user = document.getElementById('reg-username').value;
      const pass = document.getElementById('reg-password').value;

      if(!name || !user || !pass) { alert("請填寫藥局名稱、帳號與密碼！"); return; }

      // 準備要傳送給 GAS 的註冊資料打包
      const postData = { 
        action: 'register', name: name, contact: contact, username: user, password: pass 
      };
      
      const result = await callGasAPI(postData, 'reg-loading');
      if (result) {
        alert(result.message);
        if (result.success) { 
          // 註冊成功後，自動幫使用者切換回登入畫面
          toggleForm(); 
          // 清空剛剛輸入的密碼
          document.getElementById('reg-password').value = '';
        } 
      }
    }
  </script>
</body>
</html>
