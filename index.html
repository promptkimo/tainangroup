         <br><small>掃描查詢訂單進度</small>
      </div>
    </div>

    <script>
      const IMG_LOGO = "";   
      var globalData = [];
      var currentTab = 'active'; // 預設顯示全部未完成
      var currentSystem = 'order';
      var loadTimeout;

      function checkLogin() {
        var btn = document.getElementById("btnLogin");
        btn.disabled = true; btn.innerText = "驗證中...";
        if(document.getElementById("login-user").value==="lawson" && document.getElementById("login-pass").value==="062511338") {
           if (typeof google === 'undefined' || typeof google.script === 'undefined') {
              alert("⚠️ 無法連接後端。請使用「部署」網址執行。");
              btn.disabled = false; btn.innerText = "登入"; return;
           }
           document.getElementById("login-screen").style.opacity = 0;
           setTimeout(() => {
             document.getElementById("login-screen").style.display = "none";
             document.getElementById("main-container").style.display = "block";
             loadData(); 

             setInterval(function() {
                var isEditing = document.getElementById("form-card").classList.contains("editing-mode");
                if (!isEditing) { loadData(true); }
            }, 30000); 
           }, 500);
        } else {
           document.getElementById("login-error").style.display = "block";
           btn.disabled = false; btn.innerText = "登入";
        }
      }

      function loadData(isBackground = false) {
        if(document.getElementById("login-screen").style.display !== "none") return;

        if (!isBackground) {
            document.getElementById("loading-overlay").style.display="flex";
            document.getElementById("retry-btn").style.display="none";
            document.getElementById("loading-text").innerText = "資料同步中...";
        }
        
        clearTimeout(loadTimeout);
        loadTimeout = setTimeout(function(){
           if(!isBackground && document.getElementById("loading-overlay").style.display === "flex") { 
              document.getElementById("retry-btn").style.display="block";
              document.getElementById("loading-text").innerText = "回應過慢，請重試...";
           }
        }, 15000);

        if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(data => { 
               clearTimeout(loadTimeout);
               globalData=data||[]; 
               renderList(); 
               document.getElementById("loading-overlay").style.display="none"; 
            }).withFailureHandler(err => {
               clearTimeout(loadTimeout); 
               if (!isBackground) {
                   alert("讀取失敗：" + err);
                   document.getElementById("loading-overlay").style.display="none"; 
               }
            }).getOrders();
        }
      }

      function renderList() {
        var list = document.getElementById("orderList");
        var search = document.getElementById("searchInput").value.toLowerCase().trim(); updateCounts();
        
        var filteredData = globalData.filter(function(row) {
          var type = row[10] || 'order'; if (type !== currentSystem) return false;
          var status = {notified: false, step: 'pending', tags: {}}; 
          try { if(row[8]) { var s = JSON.parse(row[8]); Object.assign(status, s); if(!status.tags) status.tags = {}; } } catch(e) {}
          
          var isArchived = status.notified === true;
          var isDeleted = status.isDeleted === true;
          var isPending = status.step === 'pending';
          var isReady = status.tags && status.tags.readyToPickup;

          // ★★★ 強大搜尋邏輯：結合 姓名、電話、品項、藥局名稱(row[11])、備註(row[13])、地址 等
          if (search) { 
              var content = (row[2] + " " + row[3] + " " + row[4] + " " + (row[11]||"") + " " + (row[13]||"") + " " + (row[14]||"") + " " + (row[15]||"") + " " + (row[16]||"") + " " + (row[17]||"")).toLowerCase(); 
              if (!content.includes(search)) return false; 
          }
          
          // ★★★ 全新分頁篩選邏輯 ★★★
          if (currentTab === 'trash') return isDeleted;
          if (isDeleted) return false; // 其他頁籤不顯示已刪除
          
          if (currentTab === 'archived') return isArchived;
          if (currentTab === 'pending') return !isArchived && isPending;
          if (currentTab === 'ready') return !isArchived && isReady;
          if (currentTab === 'active') return !isArchived;

          return true;
        });
        
        var displayData = filteredData.slice();
        displayData.sort((a, b) => {
           var sA = {isPinned:false}; try { if(a[8]) sA = JSON.parse(a[8]); } catch(e){}
           var sB = {isPinned:false}; try { if(b[8]) sB = JSON.parse(b[8]); } catch(e){}
           if (sA.isPinned && !sB.isPinned) return -1;
           if (!sA.isPinned && sB.isPinned) return 1;
           
           var dateA = new Date(a[1].replace(/-/g, "/"));
           var dateB = new Date(b[1].replace(/-/g, "/"));
           return dateB - dateA; 
        });
        var html = ""; 
        displayData.forEach((row, index) => {
          var id = row[0]; 
          var status = {notified: false, pickedup: false, paid: false, step:'pending', tags:{}, isDeleted: false}; 
          try { if(row[8]) { var s = JSON.parse(row[8]); Object.assign(status, s); if(!status.tags) status.tags = {}; }} catch(e) {}
          
          var isArchived = status.notified === true;
          var isDeleted = status.isDeleted === true;
          var dateFull = row[1].substring(0, 16);
          var pinnedClass = status.isPinned ? "is-pinned" : "";
          var readyClass = (status.tags.readyToPickup && !isArchived && !isDeleted) ? "is-ready" : "";

          // ★★★ 如果有藥局名稱，將其變成一個小標籤顯示在名字旁邊 ★★★
          var pharmacyBadge = row[11] ? `<span class="badge bg-secondary ms-1" style="font-size:0.8rem; font-weight:normal;"><i class="bi bi-building"></i> ${row[11]}</span>` : '';

          var clientSection = `
            <div class="col-client">
                <div class="serial-number">#${index + 1}</div>
                <div class="client-name">${row[2]||row[16]} ${pharmacyBadge}</div>
                <div class="client-phone mb-1">${row[3].replace("'", "")}</div>
                 <div>
                   <span class="emp-badge">${row[9]}</span>
                   <span class="date-badge"><i class="bi bi-calendar-event"></i> ${dateFull}</span>
                </div>
                ${(row[12]==="是" && row[14]) ? `<div class="mt-1 text-primary small fw-bold"><i class="bi bi-truck"></i> ${row[14]}</div>` : ""}
            </div>`;
          var itemSection = "";
          if (currentSystem === 'shopee') {
              var shopeeContent = `
                <div class="mb-1"><span class="shopee-label">訂單號</span><span class="shopee-val">${row[15]||'--'}</span></div>
                <div class="mb-1"><span class="shopee-label">買家</span><span class="shopee-val">${row[16]||'--'}</span></div>
                <div class="mb-1"><span class="shopee-label">寄件</span><span class="shopee-val">${row[17]||'--'}</span></div>
                <div class="mt-2 text-primary" style="font-size:0.95rem; line-height:1.4;">
                   <i class="bi bi-chat-right-text-fill me-1"></i>備註：${row[13]||'無內容'}
                </div>`;
              itemSection = `<div class="col-items">${shopeeContent}</div>`;
          } else {
              var itemStr = row[4] ? String(row[4]) : ""; 
              var itemsArray = itemStr.split(", ");
              var itemsHtml = "";
              itemsArray.forEach((itm, idx) => {
                  itemsHtml += `<div class="item-list-row"><span class="item-idx">${idx+1}.</span><span>${itm}</span></div>`;
              });
              if(row[13]) itemsHtml += `<div class="text-muted small mt-1" style="padding-left:5px;"><i class="bi bi-chat-dots"></i> 備註：${row[13]}</div>`;
              
              var priceSection = (currentSystem === 'order') ? `<div class="mt-1 fw-bold text-danger text-end" style="font-size:1rem">$${row[7]}</div>` : '';
              
              var preorderActive = status.tags.isPreorder ? 'active' : '';
              var readyActive = status.tags.readyToPickup ? 'active' : '';
              var statusBtns = "";
              if (!isArchived && status.step !== 'pending' && !isDeleted) {
                  statusBtns = `
                    <div class="status-tags-container">
                        <div class="btn-status-toggle preorder ${preorderActive}" onclick="toggleTag('${id}','isPreorder')"><i class="bi bi-bookmark-star-fill"></i>預購單</div>
                         <div class="btn-status-toggle ready ${readyActive}" onclick="toggleTag('${id}','readyToPickup')"><i class="bi bi-gift-fill"></i>可領取</div>
                    </div>`;
              }
              itemSection = `<div class="col-items"><div>${itemsHtml}${priceSection}</div>${statusBtns}</div>`;
          }

          var actionContent = "";
          if (isDeleted) {
             actionContent = `
               <div class="d-flex flex-column gap-2 justify-content-center h-100">
                  <button class="btn btn-outline-success fw-bold" onclick="restoreRow('${id}')"><i class="bi bi-arrow-counterclockwise"></i> 還原訂單</button>
                  <button class="btn btn-danger fw-bold" onclick="deleteRow('${id}', true)"><i class="bi bi-x-circle"></i> 永久刪除</button>
               </div>`;
          } else if (isArchived) {
             actionContent = `<div class="text-center py-2 text-muted"><i class="bi bi-check-circle-fill text-success fs-3"></i><br>已歸檔<button class="btn btn-sm btn-outline-secondary mt-1 py-1 px-3" style="font-size:0.9rem" onclick="toggleNotified('${id}', false)">還原</button></div>`;
          } else if (status.step === 'pending') {
             actionContent = `<button class="btn btn-warning w-100 fw-bold py-3 shadow-sm text-dark" style="font-size:1rem;" onclick="toggleStep('${id}', 'processing')">⌛ 待處理 ⮕ 開始</button><div class="text-center mt-2 text-muted" style="font-size:0.8rem">點擊進行備貨</div>`;
          } else {
             if (currentSystem === 'shopee') {
                 actionContent = `
                    <div class="d-flex flex-column justify-content-center h-100">
                        <button class="btn btn-success w-100 py-3 fw-bold shadow-sm" style="font-size:1.1rem" onclick="toggleNotified('${id}', true)">✅ 處理完成 (歸檔)</button>
                        <div class="text-center mt-2"><button class="btn btn-sm btn-link text-muted text-decoration-none" onclick="toggleStep('${id}', 'pending')">↩ 回待處理</button></div>
                    </div>`;
             } else {
                 var topBar = `<div class="d-flex justify-content-between align-items-center mb-1"><span class="badge bg-info text-dark" style="font-size:0.8rem"><i class="bi bi-gear-fill"></i> 處理中</span><button class="btn btn-sm btn-outline-secondary py-0" style="font-size:0.85rem;" onclick="toggleStep('${id}', 'pending')">↩</button></div>`;
                 
                 var phoneActive = status.tags.missedCall ? 'active' : '';
                 var noContactActive = status.tags.noContact ? 'active' : '';
                 var cartActive = status.tags.ordered ? 'active' : '';
                 var boxActive = status.tags.outOfStock ? 'active' : '';
                 var repairingActive = status.tags.repairing ? 'active' : '';

                 var iconRow = '';
                 if (currentSystem === 'repair') {
                     iconRow = `
                        <div class="icon-btn-group">
                            <button class="icon-action-btn btn-missed ${phoneActive}" onclick="toggleTag('${id}','missedCall')" title="未接"><i class="bi bi-telephone-x"></i></button>
                            <button class="icon-action-btn btn-nocontact ${noContactActive}" onclick="toggleTag('${id}','noContact')" title="不須聯絡"><i class="bi bi-bell-slash"></i></button>
                            <button class="icon-action-btn btn-repairing ${repairingActive}" onclick="toggleTag('${id}','repairing')" title="維修中"><i class="bi bi-tools"></i></button>
                        </div>`;
                 } else {
                     iconRow = `
                        <div class="icon-btn-group">
                            <button class="icon-action-btn btn-missed ${phoneActive}" onclick="toggleTag('${id}','missedCall')" title="未接"><i class="bi bi-telephone-x"></i></button>
                            <button class="icon-action-btn btn-nocontact ${noContactActive}" onclick="toggleTag('${id}','noContact')" title="不須聯絡"><i class="bi bi-bell-slash"></i></button>
                            <button class="icon-action-btn btn-ordered ${cartActive}" onclick="toggleTag('${id}','ordered')" title="訂貨"><i class="bi bi-cart"></i></button>
                            <button class="icon-action-btn btn-stock ${boxActive}" onclick="toggleTag('${id}','outOfStock')" title="缺貨"><i class="bi bi-box-seam"></i></button>
                       </div>`;
                 }
                 var notifyBtn = `<button class="btn btn-outline-secondary w-100 btn-sm mb-1 py-1" style="font-size:0.9rem" onclick="toggleNotified('${id}', true)">🔔 通知歸檔</button>`;
                 var payClass = status.paid ? 'is-paid' : 'not-paid';
                 var payText = status.paid ? '💰 已結帳' : '✗ 未結帳';
                 var payBar = `<div class="payment-status-bar ${payClass}" onclick="togglePaid('${id}', ${!status.paid})">${payText}</div>`;
                 actionContent = topBar + iconRow + notifyBtn + payBar;
             }
          }

          var pinClass = status.isPinned ? "pinned" : "";
          var toolBar = "";
          if (!isDeleted) {
              toolBar = `<div class="tool-row">
                    <button class="btn-tool ${pinClass}" onclick='togglePin("${id}", ${!status.isPinned})' title="置頂"><i class="bi bi-star-fill"></i></button>
                    <button class="btn-tool" onclick='printId("${id}")' title="列印"><i class="bi bi-printer"></i></button>
                    <button class="btn-tool" onclick='editRow("${id}")' title="編輯" ${isArchived?'disabled':''}><i class="bi bi-pencil-fill"></i></button>
                    <button class="btn-tool text-danger" onclick='deleteRow("${id}", false)' title="刪除"><i class="bi bi-trash-fill"></i></button>
              </div>`;
          } else {
              toolBar = `<div class="tool-row text-end text-muted small">🗑️ 已刪除</div>`;
          }
          
          html += `<div class="order-card-row ${pinnedClass} ${readyClass}">${clientSection}${itemSection}<div class="col-actions"><div>${actionContent}</div>${toolBar}</div></div>`;
        });
        list.innerHTML = html || "<div class='text-center py-5 text-muted'>這裡空空如也</div>";
      }

      function togglePin(id, isPinned) {
        var r = globalData.find(row => row[0] == id); if(!r) return;
        var s = JSON.parse(r[8]); s.isPinned = isPinned; r[8] = JSON.stringify(s); renderList();
        google.script.run.updateStatus(id, 'isPinned', isPinned);
      }

      function toggleTag(id, tag) { 
        var r = globalData.find(row => row[0] == id); if(!r) return;
        var s = JSON.parse(r[8]); if(!s.tags) s.tags = {};
        s.tags[tag] = !s.tags[tag];
        if(s.tags[tag]){ 
            if(tag === 'ordered'){ s.tags.outOfStock = false; }
            if(tag === 'outOfStock'){ s.tags.ordered = false; }
            if(tag === 'repairing') { s.tags.readyToPickup = false; }
            if(tag === 'isPreorder') { s.tags.readyToPickup = false; }
            if(tag === 'readyToPickup') { 
                s.tags.isPreorder = false; s.tags.repairing = false; 
                s.tags.ordered = false; s.tags.outOfStock = false;
            }
        } 
        r[8] = JSON.stringify(s); renderList();
        google.script.run.updateStatus(id, 'tags', s.tags);
      }

      function togglePaid(id, isPaid) {
        var r = globalData.find(row => row[0] == id); if(!r) return;
        var s = JSON.parse(r[8]); s.paid = isPaid; r[8] = JSON.stringify(s); renderList();
        google.script.run.updateStatus(id, 'paid', isPaid);
      }

      function toggleStep(id, step) {
         var r = globalData.find(row => row[0] == id); if(!r) return;
         var s = JSON.parse(r[8]); s.step = step; r[8] = JSON.stringify(s); renderList();
         google.script.run.updateStatus(id, 'step', step);
      }

      function toggleNotified(id, val) { 
         var r = globalData.find(row => row[0] == id); if(!r) return;
         var s = JSON.parse(r[8]); s.notified = val; r[8] = JSON.stringify(s); renderList();
         google.script.run.updateStatus(id, 'notified', val);
      }

      // ★★★ 更新統計數字 ★★★
      function updateCounts() { 
          var activeC = 0, pendingC = 0, readyC = 0, archivedC = 0, trashC = 0;
          globalData.forEach(row => { 
              var type = row[10] || 'order'; 
              if (type !== currentSystem) return; 
              var s = {notified: false, isDeleted: false, step: 'pending', tags: {}}; 
              try{ if(row[8]) { var parsed = JSON.parse(row[8]); Object.assign(s, parsed); if(!s.tags) s.tags={}; } }catch(e){} 
              
              if (s.isDeleted) { trashC++; return; }
              if (s.notified) { archivedC++; return; }
              
              activeC++; 
              if (s.step === 'pending') pendingC++;
              if (s.tags.readyToPickup) readyC++;
          });
          document.getElementById("count-active").innerText = activeC; 
          document.getElementById("count-pending").innerText = pendingC; 
          document.getElementById("count-ready").innerText = readyC; 
          document.getElementById("count-archived").innerText = archivedC; 
          document.getElementById("count-trash").innerText = trashC;
      }
      
      // ★★★ 動態標籤切換邏輯 ★★★
      function switchTab(t) { 
          currentTab=t;
          document.getElementById("searchInput").value=""; 
          
          var tabs = ['active', 'pending', 'ready', 'archived', 'trash'];
          tabs.forEach(tab => {
             var el = document.getElementById('tab-' + tab);
             if (el) { el.className = 'nav-link text-secondary px-3 py-1'; el.style.backgroundColor = 'transparent'; el.style.color = '#64748b'; }
          });
          
          var activeEl = document.getElementById('tab-' + t);
          if (activeEl) {
             if (t === 'active') { activeEl.className = 'nav-link active px-3 py-1 fw-bold'; activeEl.style.backgroundColor = '#2d6a4f'; }
             else if (t === 'pending') { activeEl.className = 'nav-link active px-3 py-1 fw-bold'; activeEl.style.backgroundColor = '#f39c12'; }
             else if (t === 'ready') { activeEl.className = 'nav-link active px-3 py-1 fw-bold'; activeEl.style.backgroundColor = '#0d6efd'; }
             else if (t === 'archived') { activeEl.className = 'nav-link active px-3 py-1 fw-bold'; activeEl.style.backgroundColor = '#6c757d'; }
             else if (t === 'trash') { activeEl.className = 'nav-link active px-3 py-1 fw-bold'; activeEl.style.backgroundColor = '#dc3545'; }
          }
          renderList(); 
      }

      function switchSystem(sys) {
        try {
            currentSystem = sys;
            document.querySelectorAll('.system-switch-btn').forEach(b=>b.classList.remove('active')); 
            document.getElementById('btn-mode-'+sys).classList.add('active');
            
            document.body.className = "theme-" + sys; 
            document.getElementById('form-type').value = sys;
            
            document.getElementById('section-order').style.display = sys==='order'?'block':'none'; 
            document.getElementById('section-shopee').style.display = sys==='shopee'?'block':'none'; 
            document.getElementById('section-repair').style.display = sys==='repair'?'block':'none';
            document.getElementById('section-customer-normal').style.display = sys!=='shopee'?'block':'none'; 
            document.getElementById('section-customer-shopee').style.display = sys==='shopee'?'block':'none'; 
            document.getElementById('div-mailing-option').style.display = sys==='shopee'?'none':'block';
            
            var titles = {order:'➕ 新增訂貨單', repair:'➕ 新增維修單', shopee:'➕ 新增蝦皮單'};
            var colors = {order:'var(--primary-green)', repair:'var(--repair-orange)', shopee:'var(--shopee-color)'};
            
            document.getElementById('form-title').innerText = titles[sys]; 
            document.getElementById('form-title').style.color = colors[sys];
            
            cancelEdit(); 
            renderList();
        } catch(e) { console.error("Switch error", e); }
      }

      function cancelEdit() {
         document.getElementById("form-card").classList.remove("editing-mode");
         document.getElementById("form-title").innerText = currentSystem==='order'?'➕ 新增訂貨單':(currentSystem==='repair'?'➕ 新增維修單':'➕ 新增蝦皮單');
         document.getElementById("edit-id").value=""; document.getElementById("orderForm").reset();
         document.getElementById("div-edit-date").style.display="none"; 
         if(document.getElementById("c-pharmacy")) document.getElementById("c-pharmacy").value = "";
         
         if(document.getElementById("items-container")) document.getElementById("items-container").innerHTML=""; 
         if(document.getElementById("repair-container")) document.getElementById("repair-container").innerHTML="";
         
         if(currentSystem==='order') addItemRow();
         if(currentSystem==='repair') addRepairRow();
         
         document.getElementById("cancelBtn").style.display="none"; document.getElementById("submitBtn").innerText="送出單據";
         document.getElementById("c-paid").checked=false;
         calcTotal(); toggleAddressField();
      }

      function submitForm() {
        var name = document.getElementById("c-name").value.trim();
        var phone = document.getElementById("c-phone").value.trim();
        if (currentSystem !== 'shopee') {
            if (!name || !phone) { alert("⚠️ 請填寫「客戶姓名」與「聯絡電話」！"); return; }
        }
        if (currentSystem === 'order') {
            var itemRows = document.querySelectorAll("#items-container .item-row");
            if (itemRows.length === 0) { alert("⚠️ 請至少新增一項商品！"); return; }
            for (var i = 0; i < itemRows.length; i++) {
                var row = itemRows[i];
                if (!row.querySelector(".item-name").value.trim() || !row.querySelector(".item-qty").value.trim()) {
                    alert("⚠️ 第 " + (i + 1) + " 行的「品項」與「數量」尚未填寫！"); return;
                }
            }
        }
        if (currentSystem === 'repair') {
             var repairRows = document.querySelectorAll("#repair-container .repair-row");
             if (repairRows.length === 0) { alert("⚠️ 請新增維修項目！"); return; }
             for (var i = 0; i < repairRows.length; i++) {
                if (!repairRows[i].querySelector(".repair-name").value.trim()) { alert("⚠️ 請填寫維修器材名稱！"); return; }
             }
        }

        var editId = document.getElementById("edit-id").value;
        var d = {
          id: editId, emp: document.getElementById("c-emp").value, type: currentSystem,
          name: document.getElementById("c-name").value || document.getElementById("s-buyer").value,
          phone: document.getElementById("c-phone").value, 
          pharmacy: document.getElementById("c-pharmacy") ? document.getElementById("c-pharmacy").value.trim() : "",
          paid: document.getElementById("c-paid").checked,
          mailing: document.getElementById("c-mailing").checked, address: document.getElementById("c-address").value,
          remarks: document.getElementById("c-remarks").value,
          shopeeOrderId: document.getElementById("s-order-id").value, buyerAccount: document.getElementById("s-buyer").value, trackingNumber: document.getElementById("s-tracking").value,
          customDate: document.getElementById("c-date").value 
        };
        var items = []; var total = 0;
        var selector = currentSystem==='repair' ? "#repair-container .repair-row" : (currentSystem==='shopee' ? "#section-shopee .item-row" : "#items-container .item-row");
        document.querySelectorAll(selector).forEach(r => {
          if(currentSystem==='repair') {
             var nm = r.querySelector(".repair-name").value; var re = r.querySelector(".repair-reason").value;
             if(nm) items.push(`${nm} (原因: ${re})`);
          } else if(currentSystem==='order') {
             var nm = r.querySelector(".item-name").value; var q = r.querySelector(".item-qty").value; 
             var pr = r.querySelector(".item-price").value; 
             var unit = r.querySelector(".item-unit") ? r.querySelector(".item-unit").value : ""; 
             var note = r.querySelector(".item-note").value.trim();
             if(nm && q) { var sub = q * pr; total += sub; items.push(`${nm}${note?' ['+note+']':''} x ${q}${unit} ($${sub})`); }
          }
        });
        d.items = items.join(", "); d.total = total;

        if (editId) {
            var r = globalData.find(row => row[0] == editId);
            if (r) {
                r[2] = d.name; r[3] = "'" + d.phone; r[4] = d.items; r[7] = d.total; 
                r[9] = d.emp; r[10] = d.type; r[11] = d.pharmacy; r[12] = d.mailing?"是":"否";
                r[13] = d.remarks; r[14] = d.address;
                r[15] = d.shopeeOrderId; r[16] = d.buyerAccount; r[17] = d.trackingNumber;
                if(d.customDate) { r[1] = d.customDate + " 00:00:00"; }
                
                var s = JSON.parse(r[8]); s.paid = d.paid; r[8] = JSON.stringify(s);
            }
        } else {
            var newId = new Date().getTime().toString();
            var timeStr = new Date().toLocaleString('zh-TW', { hour12: false, year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }).replace(/\//g,'-');
            var statusObj = { notified: false, pickedup: false, paid: d.paid, step: 'pending', tags: { ordered: false, outOfStock: false, readyToPickup: false, missedCall: false, noContact: false, repairing: false, isPinned: false }, isDeleted: false };
            var newRow = [newId, timeStr, d.name, "'"+d.phone, d.items, "-", "-", d.total, JSON.stringify(statusObj), d.emp, d.type, d.pharmacy, d.mailing?"是":"否", d.remarks, d.address, d.shopeeOrderId, d.buyerAccount, d.trackingNumber];
            globalData.push(newRow);
        }
        
        renderList(); cancelEdit();
        var func = editId ? google.script.run.editOrder(d) : google.script.run.addOrder(d);
        func.withSuccessHandler(data => { globalData = data; renderList(); }).withFailureHandler(err => { alert("存檔失敗:" + err); });
      }

      function deleteRow(id, isPermanent) {
          if (isPermanent) {
              if(confirm("⚠️ 確定要永久刪除嗎？此動作無法復原！")) {
                  globalData = globalData.filter(row => row[0] !== id); renderList();
                  google.script.run.deleteOrder(id);
              }
          } else {
              if(confirm("確定移至垃圾桶？")) {
                  var r = globalData.find(row => row[0] == id);
                  if(r) { var s = JSON.parse(r[8]); s.isDeleted = true; r[8] = JSON.stringify(s); renderList(); google.script.run.updateStatus(id, 'isDeleted', true); }
              }
          }
      }

      function restoreRow(id) {
          if(confirm("確定還原此訂單？")) {
              var r = globalData.find(row => row[0] == id);
              if(r) { var s = JSON.parse(r[8]); s.isDeleted = false; r[8] = JSON.stringify(s); renderList(); google.script.run.updateStatus(id, 'isDeleted', false); }
          }
      }

      function scanBarcode(input) {
         var code = input.value.trim(); if (!code) return;
         var row = input.closest('.item-row'); var nameInput = row.querySelector('.item-name');
         nameInput.placeholder = "搜尋中...";
         google.script.run.withSuccessHandler(function(res) {
             if(res.found) {
                 nameInput.value = res.name; nameInput.placeholder = "品項名稱";
                 if(res.price) row.querySelector('.item-price').value = res.price;
                 calcTotal();
             } else { nameInput.value = ""; nameInput.placeholder = "❌ 找不到此條碼"; }
         }).getProductByBarcode(code);
      }

      function addItemRow(nm="", qty=1, pr=0, unit="個", note="") { 
        var c = document.getElementById("items-container"); if (!c) return; 
        var d=document.createElement("div"); d.className="item-row mb-3 p-3 rounded border bg-white shadow-sm";
        var unitOptions = ["個", "瓶", "盒", "箱", "罐", "包", "排", "支", "組"].map(u => `<option value="${u}">${u}</option>`).join("");
        d.innerHTML = `
           <div class="row g-2 mb-2">
               <div class="col-5">
                   <div class="input-group">
                       <span class="input-group-text bg-white text-muted"><i class="bi bi-upc-scan"></i></span>
                       <input type="text" class="form-control item-barcode" placeholder="掃描條碼" onchange="scanBarcode(this)">
                   </div>
               </div>
               <div class="col-7"><input type="text" class="form-control form-control-lg item-name" placeholder="品項名稱" required></div>
           </div>
           <div class="row g-2 align-items-center">
             <div class="col-3"><input type="number" class="form-control item-qty" placeholder="數" oninput="calcTotal()"></div>
             <div class="col-3"><select class="form-select item-unit">${unitOptions}</select></div>
              <div class="col-4"><input type="number" class="form-control item-price" placeholder="單價" oninput="calcTotal()"></div>
             <div class="col-2"><button type="button" class="btn btn-outline-danger w-100 h-100 d-flex align-items-center justify-content-center" onclick="this.closest('.item-row').remove(); calcTotal();"><i class="bi bi-trash fs-5"></i></button></div>
           </div>
           <div class="mt-2"><input type="text" class="form-control item-note" placeholder="備註 (選填)"></div>
        `;
        d.querySelector(".item-name").value = nm; d.querySelector(".item-qty").value = qty;
        d.querySelector(".item-unit").value = unit; d.querySelector(".item-price").value = pr;
        d.querySelector(".item-note").value = note; c.appendChild(d);
      }
      
      function addSpecificRepairRow(name, reason) { 
        var c=document.getElementById("repair-container");
        var d=document.createElement("div"); d.className="repair-row mb-3 p-3 rounded border bg-white shadow-sm"; 
        d.innerHTML=`
           <div class="mb-2"><input type="text" class="form-control form-control-lg repair-name" placeholder="器材名稱"></div>
           <div class="row g-2">
              <div class="col-10"><textarea class="form-control repair-reason" rows="1" placeholder="故障原因"></textarea></div>
              <div class="col-2"><button type="button" class="btn btn-outline-danger w-100 h-100 d-flex align-items-center justify-content-center" onclick="this.closest('.repair-row').remove()"><i class="bi bi-trash fs-5"></i></button></div>
           </div>
         `; 
        d.querySelector(".repair-name").value = name; d.querySelector(".repair-reason").value = reason; c.appendChild(d);
      }

      function addRepairRow() { addSpecificRepairRow("", ""); }
      function calcTotal() { var t=0; document.querySelectorAll(".item-qty").forEach((q,i)=>{ var p=document.querySelectorAll(".item-price")[i]; t+=((parseFloat(q.value)||0)*(parseFloat(p.value)||0)); }); document.getElementById("display-total").innerText="$"+t; }
      function toggleAddressField() { var isM = document.getElementById("c-mailing").checked; document.getElementById("address-section").style.display = isM?"block":"none"; }
      function autoFillCustomer() { var p = document.getElementById("c-phone").value.trim(); if(p.length < 3) return;
      for (var i = globalData.length - 1; i >= 0; i--) { if(globalData[i][3].replace(/'/g,"") === p) { document.getElementById("c-name").value = globalData[i][2]; break; } } }
      
      function printId(id) {
        var r = globalData.find(row => row[0] == id);
        var s = JSON.parse(r[8]);
        document.getElementById("r-time").innerText = r[1]; document.getElementById("r-emp").innerText = r[9];
        // 列印時如果填寫了藥局名稱，會一起印出來
        document.getElementById("r-name").innerText = r[2] + (r[11] ? " (" + r[11] + ")" : ""); 
        document.getElementById("r-phone").innerText = r[3].replace(/'/g,"");
        document.getElementById("r-total").innerText = r[7];
        document.getElementById("r-paid-status").innerText = s.paid?"(已結清)":"";
        document.getElementById("r-items-list").innerHTML = r[4].split(", ").map(i => `<div class="item-line">${i}</div>`).join("");
        document.getElementById("r-remarks-content").innerText = r[13]; document.getElementById("r-remarks-area").style.display = r[13] ? "block" : "none";
        var isMailing = (r[12] === "是"); var addr = r[14]; 
        document.getElementById("r-address").innerText = addr || "";
        document.getElementById("r-delivery-line").style.display = (isMailing && addr) ? "block" : "none";

        var titleLabel = "訂貨明細單";
        if (s.tags && s.tags.isPreorder) { titleLabel += " <span style='font-size:1.2em; border:2px solid #000; padding:2px 8px; border-radius:5px;'>🔖 預購單</span>"; }
        document.getElementById("receipt-title").innerHTML = titleLabel;

        var url = document.getElementById("app-url").value;
        var qrContainer = document.getElementById("r-qr-status");
        qrContainer.innerHTML = ""; 
        new QRCode(qrContainer, { text: url + "?q=" + id + "&t=" + new Date().getTime(), width: 150, height: 150 });
        setTimeout(() => window.print(), 100);
      }
      
      function editRow(id) {
        try {
            var r = globalData.find(row => row[0] == id); if(!r) return;
            var s = {}; try { if(r[8]) s = JSON.parse(r[8]); } catch(e) { console.log("JSON Error", e); }
            
            var type = r[10] || 'order';
            currentSystem = type;
            document.querySelectorAll('.system-switch-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById('btn-mode-'+type).classList.add('active');
            document.body.className = "theme-" + type; document.getElementById('form-type').value = type;

            document.getElementById('section-order').style.display = type==='order'?'block':'none';
            document.getElementById('section-shopee').style.display = type==='shopee'?'block':'none';
            document.getElementById('section-repair').style.display = type==='repair'?'block':'none';
            document.getElementById('section-customer-normal').style.display = type!=='shopee'?'block':'none';
            document.getElementById('section-customer-shopee').style.display = type==='shopee'?'block':'none';
            document.getElementById('div-mailing-option').style.display = type==='shopee'?'none':'block';

            if(document.getElementById("items-container")) document.getElementById("items-container").innerHTML=""; 
            if(document.getElementById("repair-container")) document.getElementById("repair-container").innerHTML="";

            document.getElementById("form-card").classList.add("editing-mode");
            document.getElementById("form-title").innerText="✏️ 修改";
            document.getElementById("edit-id").value = r[0];
            document.getElementById("c-emp").value = r[9];
            document.getElementById("c-remarks").value = r[13];
            document.getElementById("c-paid").checked = s.paid;
            
            var datePart = r[1].substring(0, 10).replace(/\//g, "-");
            document.getElementById("c-date").value = datePart;
            document.getElementById("div-edit-date").style.display = "block";

            if(type==='shopee') {
                document.getElementById("s-order-id").value = r[15];
                document.getElementById("s-buyer").value = r[16];
                document.getElementById("s-tracking").value = r[17];
            } else {
                document.getElementById("c-name").value = r[2];
                document.getElementById("c-phone").value = r[3].replace("'", "");
                if(document.getElementById("c-pharmacy")) document.getElementById("c-pharmacy").value = r[11] || "";
                document.getElementById("c-mailing").checked = (r[12]==="是");
                toggleAddressField(); document.getElementById("c-address").value = r[14];
            }

            var rawItems = r[4] ? String(r[4]) : "";
            if(type==='repair') {
                if(rawItems) {
                    var parts = rawItems.split("), ");
                    parts.forEach(str => {
                        if(!str.endsWith(')')) str+=')';
                        var m = str.match(/(.+) \(原因: (.*)\)/);
                        if(m) addSpecificRepairRow(m[1], m[2]); else addSpecificRepairRow(str, ""); 
                    });
                } else { addRepairRow(); }
            } else if (type === 'order') {
                if(rawItems && rawItems.length > 0) {
                    var parts = rawItems.split(", ");
                    parts.forEach(str => {
                        var m = str.match(/(.+?)(?: \[(.+?)\])? x (\d+)(.*?) \(\$(\d+)\)/);
                        if(m) {
                            var totalP = parseFloat(m[5]) || 0; var q = parseFloat(m[3]) || 1;
                            var unitP = (q > 0) ? (totalP / q) : 0;
                            addItemRow(m[1], q, unitP, m[4].trim(), m[2]||"");
                        } else {
                            if(str.trim() !== "") { addItemRow(str, 1, 0, "", ""); }
                        }
                    });
                    calcTotal();
                } else { addItemRow(); }
            }

            document.getElementById("cancelBtn").style.display="block";
            document.getElementById("submitBtn").innerText="💾 儲存修改";
            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (e) { console.error(e); alert("編輯功能異常，請截圖給工程師: " + e.message); }
      }

      window.onload = function() { 
          addItemRow();
          if(IMG_LOGO) { document.getElementById("r-logo-img").src = IMG_LOGO; document.getElementById("r-logo-img").style.display = "inline"; } 
      };
    </script>
  </body>
</html>
